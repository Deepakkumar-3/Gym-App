<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Gym App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700&family=IBM+Plex+Mono:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="page">
    <div class="rack">
      <p class="sign">Gym App</p>
      <h1>Back on the floor</h1>

      <div class="card">
        <div id="message" class="message"></div>

        <form id="login-form">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" required autocomplete="email">
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" required autocomplete="current-password">
          </div>

          <button type="submit" id="submit-btn">Log in</button>
        </form>

        <p class="hint">New here? <a href="/signup">Create an account</a></p>
      </div>
    </div>
  </div>

  <script src="/static/auth.js"></script>
  <script>
    const form = document.getElementById("login-form");
    const messageEl = document.getElementById("message");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;

      const payload = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
      };

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (!res.ok) {
          showMessage(messageEl, data.detail || "Incorrect email or password.", "error");
          submitBtn.disabled = false;
          return;
        }

        setAccessToken(data.access_token);
        // Redirect to dashboard after successful login
        window.location.href = "/dashboard";
      } catch (err) {
        showMessage(messageEl, "Network error — is the server running?", "error");
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
